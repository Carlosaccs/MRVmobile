<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MRV Mobile</title>
    <link rel="stylesheet" href="mobile.css"> </head>
<body>

<div class="mobile-wrapper">
   <div class="faixa-verde-vertical">
    <div class="icon-top" onclick="toggleMenuLateral()">
        <svg viewBox="0 0 24 24" width="32" height="32" fill="white"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </div>
    
    <div class="titulo-vertical">MRV em SP</div>
    
    <div class="controles-zoom">
        <div class="btn-zoom" onclick="zoomIn()">+</div>
        <div class="btn-zoom" onclick="zoomOut()">−</div>
    </div>

    <div id="contador-registros" class="icon-bottom">42</div>
</div>

    <div id="menu-lateral-container">
        <div id="trilho-infinito"></div>
    </div>

    <div id="mapa-container"></div>
    <div id="identificador-cidade"></div>

    <div id="mapa-minimizado" onclick="trocarMapas()"></div>

    <div class="ficha-tecnica">
        <h2 id="nome-imovel">CIDADE</h2>
        <div id="detalhes-imovel">Selecione um ponto no mapa</div>
    </div>
</div>

<script src="mapas.js"></script> <script src="mobile.js"></script> </body>
</html>
